openapi: 3.1.0
info:
  title: Bookmark Searcher API
  version: 1.0.0
paths:
  /auth/register:
    post:
      operationId: register-user
      summary: Register a new user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Successfully registered user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/login:
    post:
      operationId: login-user
      summary: Login a user and receive an authentication token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successfully logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/logout:
    post:
      operationId: logout-user
      summary: Logout a user and invalidate the authentication token
      responses:
        '200':
          description: Successfully logged out
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /bookmarks:
    get:
      operationId: get-bookmarks
      summary: Retrieve list of bookmarks
      responses:
        '200':
          description: Successfully retrieved list of bookmarks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bookmarks'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: create-bookmark
      summary: Create a new bookmark
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
      responses:
        '201':
          description: Successfully created bookmark
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bookmark'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /search:
    post:
      operationId: search-bookmarks
      summary: Search bookmarks by query
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
      responses:
        '200':
          description: Successfully retrieved search results
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - bookmark
                    - similarity
                    - chunk_content
                  properties:
                    bookmark:
                      $ref: '#/components/schemas/Bookmark'
                    similarity:
                      type: number
                      format: float
                    chunk_content:
                      type: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    Error:
      type: object
      required:
        - status_code
        - message
      properties:
        status_code:
          type: integer
        message:
          type: string
    AuthToken:
      type: object
      required:
        - token
      properties:
        token:
          type: string
    Bookmark:
      type: object
      required:
        - id
        - url
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        title:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Bookmarks:
      type: array
      items:
        $ref: '#/components/schemas/Bookmark'
